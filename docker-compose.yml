version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: nride_db
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - nride-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nride_server
    ports:
      - '5000:5000'
    environment:
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/nride?authSource=admin
      PORT: 5000
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - nride-network
    volumes:
      - ./server:/app

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: nride_client
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - server
    networks:
      - nride-network
    volumes:
      - ./client:/app

volumes:
  mongodb_data:

networks:
  nride-network:
    driver: bridge
